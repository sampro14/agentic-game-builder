version: "3.9"

services:
  game-builder:
    build: .
    image: game-builder-agent
    container_name: game-builder-agent

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}

    volumes:
      - ./output:/app/output
      - ./runs:/app/runs
      - ./debug:/app/debug
      - ./.cache:/app/.cache

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m

    networks:
      - game-builder-network


networks:
  game-builder-network:
    driver: bridge